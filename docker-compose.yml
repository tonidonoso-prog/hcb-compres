services:
  hcb-compres:
    image: ${ECR_REGISTRY}/${IMAGE_NAME}:${VERSION:-latest}
    ports:
      - "8080:8080"
    volumes:
      # --- Catálogo: Excel de datos, caché parquet, HTML generado, índice fichas ---
      - ./data:/app/data

      # --- Módulo Varios PDF/PCAP: PDFs entrada, Word resultados, PDFs procesados ---
      - "./pcap_varios/input:/app/Varios PDF/PCAP/leer_pdf"
      - "./pcap_varios/resultados:/app/Varios PDF/PCAP/resultados_word"
      - "./pcap_varios/procesados:/app/Varios PDF/PCAP/procesados"

    restart: unless-stopped
