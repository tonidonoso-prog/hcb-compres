# GitLab CI/CD Pipeline para HCB-DSG
# Este archivo automatiza la construcción y subida de la imagen Docker a AWS ECR.

stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION}"
  # ECR_REGISTRY: Se construye dinámicamente usando la variable AWS_ACCOUNT_ID que configures en GitLab
  ECR_REGISTRY: "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
  IMAGE_NAME: "direccioserveisgenerals/compres/hcb-dsg"

# COMPILACIÓN: Se ejecuta en cada commit a main para verificar que el Docker funciona.
build-dev:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t $IMAGE_NAME:dev -f docker/Dockerfile .
  only:
    - main

# DESPLIEGUE: Solo se ejecuta cuando creas un TAG (ej: "v1.0"). Sube la imagen a AWS ECR.
deploy-to-ecr:
  stage: deploy
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - apk add --no-cache aws-cli
    - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
  script:
    - docker build -t $IMAGE_NAME:$CI_COMMIT_TAG -f docker/Dockerfile .
    - docker tag $IMAGE_NAME:$CI_COMMIT_TAG $ECR_REGISTRY/$IMAGE_NAME:$CI_COMMIT_TAG
    - docker tag $IMAGE_NAME:$CI_COMMIT_TAG $ECR_REGISTRY/$IMAGE_NAME:latest
    - docker push $ECR_REGISTRY/$IMAGE_NAME:$CI_COMMIT_TAG
    - docker push $ECR_REGISTRY/$IMAGE_NAME:latest
  only:
    - tags
