# GitLab CI/CD Pipeline para HCB-DSG
# Este archivo automatiza la construcción y subida de la imagen Docker a AWS ECR.

stages:
  - build-and-push

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  AWS_DEFAULT_REGION: "eu-west-1"
  ECR_REGISTRY: "248189917711.dkr.ecr.eu-west-1.amazonaws.com"
  IMAGE_NAME: "direccioserveisgenerals/compres/hcb-dsg"

build-image:
  stage: build-and-push
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - apk add --no-cache aws-cli
    - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
  script:
    - docker build -t $IMAGE_NAME:$CI_COMMIT_SHORT_SHA -f docker/Dockerfile .
    - docker tag $IMAGE_NAME:$CI_COMMIT_SHORT_SHA $ECR_REGISTRY/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA
    - docker tag $IMAGE_NAME:$CI_COMMIT_SHORT_SHA $ECR_REGISTRY/$IMAGE_NAME:latest
    - docker push $ECR_REGISTRY/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA
    - docker push $ECR_REGISTRY/$IMAGE_NAME:latest
  only:
    - main
